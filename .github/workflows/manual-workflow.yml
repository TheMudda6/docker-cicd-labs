name: Testing manual pushing using workflow_dispatch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Allows us to specify what we want to test. By default, it will test the main branch.'
        required: false
        default: 'main'

jobs:
  test:
    runs-on: ubuntu-latest

    environment:
      name: production

    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Display deployment message
        run: echo "${{ secrets.DEPLOY_MESSAGE }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            cache: 'pip'
            python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python -c "import app"
    
      - name: Create deployment log
        run: echo "Deployment completed successfully" > deployment-log.txt

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-log
          path: deployment-log.txt

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t docker-cicd-labs:v1.${{ github.run_number }} .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy stage
        run: echo "Deploying application after build completed"